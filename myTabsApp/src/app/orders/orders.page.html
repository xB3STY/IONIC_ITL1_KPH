<ion-header>
  <ion-toolbar>
    <ion-title>Aufträge</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <ion-list>
    <ion-item *ngFor="let order of orders">
      <ion-label>
        <h2>Order #{{ order.id }}</h2>
        <p>{{ order.name || 'No name' }}</p>
      </ion-label>
    </ion-item>
  </ion-list>

</ion-content>
